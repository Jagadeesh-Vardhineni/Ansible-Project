- name: create ec2 and r53 records
  hosts: all
  connection: local
  vars:
    sg_id: sg-06e8a11e6012588b9
    ami_id: ami-0220d79f3f480ecf5
    instances:
    - mongodb

  
  tasks:
  - name: create ec2 instance
    amazon.aws.ec2_instance:
      instance_type:  t3.micro
      security_group: " {{sg_id}}"
      image_id: "{{ami_id}}"
      tags:
        Project: roboshop
        Component: "{{item}}"
        Envioronment: " {{env}}"
        Name : "{{item}}-{{env}}"
    loop: "{{instances}}"
